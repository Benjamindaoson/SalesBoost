services:
  - type: web
    name: salesboost-backend
    env: docker
    region: singapore # Optional: choose a region close to you
    plan: free
    branch: main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENV_STATE
        value: production
