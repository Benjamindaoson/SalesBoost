version: "3.8"

services:
  api:
    build: .
    image: salesboost-api:latest
    container_name: salesboost_api
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./salesboost.db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - salesboost_db:/app/salesboost.db
      - salesboost_logs:/app/logs
      - salesboost_monitoring:/app/monitoring
      - salesboost_knowledge:/app/knowledge_db
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - backend
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    image: salesboost-web:latest
    container_name: salesboost_web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - backend
      - public

  redis:
    image: redis:7-alpine
    container_name: salesboost_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  salesboost_db:
  salesboost_logs:
  salesboost_monitoring:
  salesboost_knowledge:
  redis_data:

networks:
  public:
  backend:
    internal: true
