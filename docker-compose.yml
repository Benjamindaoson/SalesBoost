version: '3.8'

services:
  salesboost:
    build: .
    image: salesboost:latest
    container_name: salesboost_app
    ports:
      - "8000:8000"
    volumes:
      - ./salesboost.db:/app/salesboost.db
      - ./chroma_db:/app/chroma_db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///salesboost.db
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
